<!DOCTYPE html>

      theme: {
        extend: {
          colors: {
            primary: '#b8860b', secondary: '#78716c', accent: '#c0392b',
            neutral: '#faf8f5', dark: '#1c1917',

            serif: ['"Noto Serif SC"', '"Crimson Pro"', 'Georgia', 'serif'],
            ma: ['"LXGW WenKai"', '"Ma Shan Zheng"', 'serif'],
            display: ['"Crimson Pro"', '"Noto Serif SC"', 'Georgia', 'serif']
          },
        },
      },
    }
  </script>
</head>
<body class="bg-neutral text-dark font-sans antialiased grain">

  <!-- 阅读进度条 -->
  <div id="reading-progress"></div>

  <!-- ─── 导航栏（简约） ─── -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-gray-200/50 transition-shadow duration-300">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
          <i class="fa fa-paper-plane text-primary text-xl"></i>
          <span class="text-xl font-semibold">诺诺的小博客空间</span>
        </a>
        <div class="hidden md:flex items-center gap-8">
          <a href="index.html" class="text-sm font-medium text-gray-700 hover:text-primary transition-colors">首页</a>
          <a href="archive.html" class="text-sm font-medium text-gray-500 hover:text-primary transition-colors">归档</a>
          <a href="about.html" class="text-sm font-medium text-gray-500 hover:text-primary transition-colors">关于</a>
        </div>
        <button id="menuBtn" class="md:hidden w-10 h-10 flex items-center justify-center text-gray-700 hover:text-primary rounded-lg hover:bg-gray-100 transition-colors" aria-label="菜单">
          <i class="fa fa-bars text-xl"></i>
        </button>
      </div>
    </div>
    <div id="mobileMenu" class="hidden md:hidden glass border-t border-gray-200/50">

        <a href="archive.html" class="block px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100">归档</a>
        <a href="about.html" class="block px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100">关于</a>
      </div>
    </div>
  </nav>

  <!-- ─── 404 内容 ─── -->
  <section class="relative min-h-screen flex items-center justify-center overflow-hidden ink-bg">
    <div class="ink-particle"></div>
    <div class="ink-particle"></div>
    <div class="ink-particle"></div>
    <div class="ink-particle"></div>
    <div class="ink-particle"></div>
    <canvas id="ink-canvas" class="absolute inset-0 w-full h-full pointer-events-none" style="z-index: 1; opacity: 0.5;"></canvas>
    <div class="absolute inset-0 flex items-center justify-center pointer-events-none select-none">
      <span class="font-ma" style="font-size: clamp(16rem, 40vw, 30rem); color: rgba(184,134,11,0.025); letter-spacing: 0.1em;">404</span>
    </div>
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-px h-full pointer-events-none" style="background: linear-gradient(180deg, transparent 10%, rgba(184,134,11,0.06) 40%, rgba(184,134,11,0.06) 60%, transparent 90%);"></div>
    <div class="relative z-10 w-full max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <div class="animate-fadeIn">
        <h1 class="font-bold leading-none mb-6" style="font-size: clamp(6rem, 18vw, 12rem);">
          <span class="text-gradient">404</span>
        </h1>
        <div class="mx-auto w-20 h-px mb-8" style="background: linear-gradient(90deg, transparent, rgba(184,134,11,0.3), transparent);"></div>
        <p class="font-bold mb-5" style="font-size: clamp(1.5rem, 4vw, 2.5rem); color: rgba(255,255,255,0.8);">
          页面不见了
        </p>
        <div class="font-ma text-lg md:text-xl leading-relaxed max-w-lg mx-auto" style="color: rgba(212,175,55,0.45); letter-spacing: 0.1em;">
          <p>这首诗可能被风吹走了……</p>
          <p class="mt-3">寻寻觅觅，冷冷清清，</p>
          <p>点一盏灯，等一片归来的云。</p>
        </div>
        <div class="mt-14">
          <a href="index.html" class="group relative inline-flex items-center gap-2 px-10 py-3.5 rounded-full font-medium transition-all duration-500 backdrop-blur-sm border overflow-hidden" style="color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);">
            <span class="relative z-10"><i class="fa fa-arrow-left mr-1"></i> 返回首页</span>
            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
          </a>
        </div>
        <div class="seal mt-10 mx-auto"><span>失</span></div>
      </div>
    </div>
  </section>

  <!-- ─── 页脚 ─── -->
  <footer class="text-white py-14">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col md:flex-row justify-between items-center gap-8">
        <div class="text-center md:text-left">
          <div class="flex items-center justify-center md:justify-start gap-3">
            <span class="text-lg font-semibold tracking-wide" style="color: rgba(255,255,255,0.9);">诺诺的小博客空间</span>
          </div>
          <p class="mt-3 text-sm tracking-wider" style="color: rgba(255,255,255,0.3); font-family: 'Crimson Pro', serif; font-style: italic;">记录生活，分享美好，终身学习</p>
        </div>
        <div class="flex items-center gap-6">
          <a href="feed.xml" class="transition-colors hover:text-[var(--gold)]" style="color: rgba(255,255,255,0.3);" aria-label="RSS 订阅" target="_blank"><i class="fa fa-rss text-lg"></i></a>

      </div>
      <div class="mt-10 pt-8 text-center" style="border-top: 1px solid rgba(255,255,255,0.06);">
